<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Saved products</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 1280px;
    height: 800px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: linear-gradient(135deg, #f97316 0%, #ea580c 60%, #c2410c 100%);
    color: white;
    display: flex;
    align-items: center;
    padding: 0 80px;
    gap: 60px;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.18) 0%, transparent 50%),
      radial-gradient(circle at 10% 90%, rgba(0,0,0,0.18) 0%, transparent 50%);
    pointer-events: none;
  }
  .copy { flex: 1; max-width: 600px; position: relative; z-index: 1; }
  .badge {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 14px 8px 8px; border-radius: 999px;
    background: rgba(255,255,255,0.16);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    font-size: 14px; font-weight: 600;
    margin-bottom: 28px;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .badge img { width: 28px; height: 28px; border-radius: 6px; display: block; }
  h1 {
    font-size: 62px;
    line-height: 1.05;
    margin: 0 0 22px;
    font-weight: 800;
    letter-spacing: -1.5px;
  }
  .lead {
    font-size: 22px;
    line-height: 1.5;
    opacity: 0.95;
    margin: 0 0 28px;
  }
  .features {
    display: flex; flex-direction: column; gap: 10px;
    font-size: 17px;
  }
  .features span::before {
    content: '✓';
    display: inline-block;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(255,255,255,0.22);
    text-align: center; line-height: 22px;
    margin-right: 10px;
    font-size: 13px; font-weight: 700;
  }
  .popup-shell {
    width: 520px;
    height: 720px;
    border-radius: 20px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.40), 0 6px 18px rgba(0,0,0,0.20);
    overflow: hidden;
    background: white;
    position: relative;
    z-index: 1;
  }
  iframe { display: block; width: 100%; height: 100%; border: 0; }
</style>
</head>
<body>
  <div class="copy">
    <div class="badge"><img src="../../icons/icon128.png" alt="">Smart Seller Profit Calculator</div>
    <h1>Save every product. Compare at a glance.</h1>
    <p class="lead">Your full catalog of margins in one place — sort by profit, margin, or name.</p>
    <div class="features">
      <span>Sort by profit, margin, name, or date</span>
      <span>One-tap load back into the calculator</span>
      <span>Duplicate, tweak, re-save</span>
    </div>
  </div>
  <div class="popup-shell">
    <iframe src="../../popup.html?demo=saved"></iframe>
  </div>
</body>
</html>
