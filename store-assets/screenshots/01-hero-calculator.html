<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hero · Calculator</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 1280px;
    height: 800px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: linear-gradient(135deg, #34d399 0%, #059669 60%, #047857 100%);
    color: white;
    display: flex;
    align-items: center;
    padding: 0 80px;
    gap: 60px;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.18) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(0,0,0,0.18) 0%, transparent 50%);
    pointer-events: none;
  }
  .copy { flex: 1; max-width: 600px; position: relative; z-index: 1; }
  .badge {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 14px 8px 8px; border-radius: 999px;
    background: rgba(255,255,255,0.16);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    font-size: 14px; font-weight: 600;
    margin-bottom: 28px;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .badge img { width: 28px; height: 28px; border-radius: 6px; display: block; }
  h1 {
    font-size: 64px;
    line-height: 1.05;
    margin: 0 0 22px;
    font-weight: 800;
    letter-spacing: -1.5px;
  }
  .lead {
    font-size: 22px;
    line-height: 1.5;
    opacity: 0.95;
    margin: 0 0 28px;
    font-weight: 400;
  }
  .features {
    display: grid;
    grid-template-columns: repeat(2, auto);
    gap: 10px 28px;
    font-size: 16px;
  }
  .features span::before {
    content: '✓';
    display: inline-block;
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    text-align: center; line-height: 20px;
    margin-right: 8px;
    font-size: 12px; font-weight: 700;
  }
  .popup-shell {
    width: 520px;
    height: 720px;
    border-radius: 20px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.40), 0 6px 18px rgba(0,0,0,0.20);
    overflow: hidden;
    background: white;
    position: relative;
    z-index: 1;
  }
  iframe { display: block; width: 100%; height: 100%; border: 0; }
</style>
</head>
<body>
  <div class="copy">
    <div class="badge"><img src="../../icons/icon128.png" alt="">Smart Seller Profit Calculator</div>
    <h1>Know your profit on every single order.</h1>
    <p class="lead">Enter product cost, delivery, ad spend, and selling price — see profit, margin, and break-even price instantly.</p>
    <div class="features">
      <span>Profit + margin %</span>
      <span>Break-even price</span>
      <span>BDT &amp; USD</span>
      <span>Works offline</span>
    </div>
  </div>
  <div class="popup-shell">
    <iframe src="../../popup.html?demo=calc"></iframe>
  </div>
</body>
</html>
